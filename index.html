<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>MiMo DevOps Assistant</title><style>body{font-family:Inter,system-ui,sans-serif;background:#070a12;color:#eaf0ff;margin:0}main{max-width:980px;margin:0 auto;padding:48px 20px}.hero{border:1px solid #1f2a44;background:linear-gradient(135deg,#0d1220,#111a2e);border-radius:24px;padding:32px}h1{font-size:44px;margin:0 0 12px}p{color:#aebbd3;font-size:18px}textarea{width:100%;min-height:220px;background:#0b1020;color:#eaf0ff;border:1px solid #2a385a;border-radius:16px;padding:16px;font:14px ui-monospace,monospace;box-sizing:border-box}button{background:#6d5cff;color:white;border:0;border-radius:14px;padding:14px 22px;font-weight:700;cursor:pointer;margin-top:14px}pre{white-space:pre-wrap;background:#0b1020;border:1px solid #2a385a;border-radius:16px;padding:16px;min-height:180px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}.pill{display:inline-block;background:#17203a;border:1px solid #2a385a;border-radius:999px;padding:8px 12px;color:#b9c7e6;font-size:13px;margin:4px 4px 16px 0}a{color:#9bb7ff}@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:32px}}</style></head><body><main><section class="hero"><span class="pill">Vercel Live Demo</span><span class="pill">Xiaomi MiMo Ready</span><span class="pill">Mock mode if MIMO_API_KEY missing</span><h1>MiMo DevOps Assistant</h1><p>Paste Linux diagnostics/logs and get safe troubleshooting suggestions.</p><p>GitHub: <a href="https://github.com/0xN404T/mimo-devops-assistant">0xN404T/mimo-devops-assistant</a></p></section><div class="grid"><section><h2>Linux Logs</h2><textarea id="input">Filesystem 95% full on /var
node app exited with code 1
ECONNREFUSED 127.0.0.1:5432</textarea><button onclick="runDemo()">Run Demo</button></section><section><h2>Output</h2><pre id="out">Click Run Demo.</pre></section></div></main><script>async function runDemo(){const out=document.getElementById('out');out.textContent='Running...';try{const r=await fetch('/api/demo',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({input:document.getElementById('input').value})});out.textContent=JSON.stringify(await r.json(),null,2)}catch(e){out.textContent='Error: '+e.message}}</script></body></html>
